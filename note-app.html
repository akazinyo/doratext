    function deleteIndependentCodeCard(id) {
      const idx = independentCodeCards.findIndex(c => c.id === id);
      if (idx === -1) return;
      independentCodeCards.splice(idx, 1);
      document.querySelector(`.independent-code-card[data-id="${id}"]`)?.remove();
      saveWorkspace();
      updateEmptyState();
    }

    function syncIndependentCodeDisplay(textarea, codeDisplay, language) {
      if (!codeDisplay) return;
      codeDisplay.className = `code-display block language-${language} outline-none`;
      if (window.Prism && language !== 'plaintext') {
        codeDisplay.textContent = textarea.value;
        Prism.highlightElement(codeDisplay);
      } else {
        codeDisplay.innerHTML = textarea.value
          .replace(/&/g, '&').replace(/</g, '<').replace(/>/g, '>');
      }
      textarea.style.height = 'auto';
      textarea.style.height = textarea.scrollHeight + 'px';
    }

    function initCodeCardDrag(el, card) {
      const header = el.querySelector('.code-card-header');
      let dragStateLocal = null;

      header.addEventListener('pointerdown', (e) => {
        if (e.button !== 0) return;
        if (e.target.closest('.code-lang-select') || e.target.closest('.code-copy-btn') || e.target.closest('.code-delete-btn')) return;
        e.preventDefault();
        el.setPointerCapture(e.pointerId);
        el.classList.add('dragging');
        dragStateLocal = {
          startX: e.clientX, startY: e.clientY,
          initialLeft: card.x, initialTop: card.y
        };
      });

      el.addEventListener('pointermove', (e) => {
        if (!dragStateLocal) return;
        e.preventDefault();
        const dx = e.clientX - dragStateLocal.startX;
        const dy = e.clientY - dragStateLocal.startY;
        card.x = Math.max(0, dragStateLocal.initialLeft + dx);
        card.y = Math.max(0, dragStateLocal.initialTop + dy);
        el.style.left = card.x + 'px';
        el.style.top = card.y + 'px';
      });

      el.addEventListener('pointerup', (e) => {
        if (!dragStateLocal) return;
        el.classList.remove('dragging');
        el.releasePointerCapture(e.pointerId);
        dragStateLocal = null;
        saveWorkspace();
      });

      el.addEventListener('pointercancel', () => {
        if (!dragStateLocal) return;
        el.classList.remove('dragging');
        dragStateLocal = null;
      });
    }

    function updateEmptyState() {
      const hasContent = blocks.length || connections.length || freeDrawings.length || independentCodeCards.length;
      emptyState.style.display = hasContent ? 'none' : 'flex';
    }

    /* ----------------- Geometry helpers ----------------- */
    function getSocketPoint(blockId, side) {
      const block = blocks.find(b => b.id === blockId);
      if (!block) return null;
      const x = block.x + block.width / 2;
      const y = block.y + block.height / 2;
      switch (side) {
        case 'top': return { x, y: block.y };
        case 'right': return { x: block.x + block.width, y };
        case 'bottom': return { x, y: block.y + block.height };
        case 'left': return { x: block.x, y };
        default: return { x, y };
      }
    }

    function getSocketNormal(side) {
      switch (side) {
        case 'top': return { x: 0, y: -1 };
        case 'right': return { x: 1, y: 0 };
        case 'bottom': return { x: 0, y: 1 };
        case 'left': return { x: -1, y: 0 };
      }
    }

    /* ----------------- Connections ----------------- */
    function createConnection(fromId, fromSide, toId, toSide) {
      if (fromId === toId) return;
      const exists = connections.find(c =>
        c.fromId === fromId && c.fromSide === fromSide && c.toId === toId && c.toSide === toSide
      );
      if (exists) return;

      const conn = {
        id: nextConnId++,
        fromId, fromSide, toId, toSide,
        color: lineColorSelect.value,
        style: lineStyleSelect.value
      };
      connections.push(conn);
      renderConnections();
      saveWorkspace();
    }

    function removeConnectionsForBlock(blockId) {
      connections = connections.filter(c => c.fromId !== blockId && c.toId !== blockId);
      renderConnections();
    }

    function deleteConnection(id) {
      connections = connections.filter(c => c.id !== id);
      renderConnections();
      saveWorkspace();
      updateEmptyState();
    }

    function getThemeColor(hex) {
      if (hex === '#334155') return document.documentElement.classList.contains('dark') ? '#94a3b8' : '#334155';
      return hex;
    }

    function renderConnections() {
      // Remove old paths (keep defs)
      const oldPaths = svg.querySelectorAll('.connection-group, .preview-line');
      oldPaths.forEach(p => p.remove());

      connections.forEach(conn => {
        const start = getSocketPoint(conn.fromId, conn.fromSide);
        const end = getSocketPoint(conn.toId, conn.toSide);
        if (!start || !end) return;

        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        g.classList.add('connection-group');
        g.dataset.connId = conn.id;

        const color = getThemeColor(conn.color);
        const dash = conn.style === 'dashed' ? '7,5' : 'none';
        const d = buildPath(start, end, conn.fromSide, conn.toSide, conn.style);

        const hit = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        hit.setAttribute('d', d);
        hit.setAttribute('class', 'connection-hit');

        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', d);
        path.setAttribute('class', 'connection-path');
        path.setAttribute('stroke', color);
        path.setAttribute('stroke-dasharray', dash);
        path.setAttribute('marker-end', 'url(#arrowhead)');

        // Update arrowhead fill color dynamically
        const markerPolygon = document.getElementById('arrowhead')?.querySelector('polygon');
        if (markerPolygon) markerPolygon.setAttribute('fill', color);

        g.appendChild(hit);
        g.appendChild(path);
        svg.appendChild(g);

        g.addEventListener('dblclick', () => deleteConnection(conn.id));
      });
    }

    function buildPath(start, end, fromSide, toSide, style) {
      if (style === 'straight' || style === 'dashed') {
        return `M ${start.x} ${start.y} L ${end.x} ${end.y}`;
      }
      // Curved bezier
      const n1 = getSocketNormal(fromSide);
      const n2 = getSocketNormal(toSide);
      const dist = Math.hypot(end.x - start.x, end.y - start.y);
      const cpDist = Math.max(40, dist * 0.45);
      const cp1 = { x: start.x + n1.x * cpDist, y: start.y + n1.y * cpDist };
      const cp2 = { x: end.x + n2.x * cpDist, y: end.y + n2.y * cpDist };
      return `M ${start.x} ${start.y} C ${cp1.x} ${cp1.y}, ${cp2.x} ${cp2.y}, ${end.x} ${end.y}`;
    }

    function updateConnectionsRealtime() {
      renderConnections();
    }

    /* ----------------- Drawing connections ----------------- */
    function startDrawConnection(e, block, side, socket) {
      if (freeDrawMode) return;
      if (e.button !== 0) return;
      e.preventDefault();
      e.stopPropagation();

      const startPt = getSocketPoint(block.id, side);
      drawState = {
        fromId: block.id,
        fromSide: side,
        startX: startPt.x,
        startY: startPt.y,
        preview: document.createElementNS('http://www.w3.org/2000/svg', 'path')
      };

      drawState.preview.setAttribute('class', 'preview-line');
      drawState.preview.setAttribute('stroke', lineColorSelect.value);
      drawState.preview.setAttribute('stroke-dasharray', '5,5');
      svg.appendChild(drawState.preview);

      socket.classList.add('active');
      setDrawingMode(true);

      window.addEventListener('pointermove', onDrawMove);
      window.addEventListener('pointerup', onDrawEnd);
    }

    function onDrawMove(e) {
      if (!drawState) return;
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left + canvas.scrollLeft;
      const y = e.clientY - rect.top + canvas.scrollTop;
      const d = buildPath(
        { x: drawState.startX, y: drawState.startY },
        { x, y },
        drawState.fromSide,
        'left',
        'curved'
      );
      drawState.preview.setAttribute('d', d);
    }

    function onDrawEnd(e) {
      if (!drawState) return;

      const target = document.elementFromPoint(e.clientX, e.clientY);
      const socket = target?.closest('.socket');

      if (socket) {
        const toId = parseInt(socket.dataset.blockId, 10);
        const toSide = socket.dataset.side;
        createConnection(drawState.fromId, drawState.fromSide, toId, toSide);
      }

      drawState.preview.remove();
      document.querySelectorAll('.socket.active').forEach(s => s.classList.remove('active'));
      drawState = null;
      setDrawingMode(false);

      window.removeEventListener('pointermove', onDrawMove);
      window.removeEventListener('pointerup', onDrawEnd);
    }

    function setDrawingMode(active) {
      drawingMode = active;
      if (active) {
        setFreeDrawMode(false);
        svg.classList.add('drawing');
        canvas.classList.add('drawing');
        drawLineBtn.classList.add('ring-2', 'ring-indigo-500', 'bg-indigo-100', 'dark:bg-indigo-900/40');
      } else {
        svg.classList.remove('drawing');
        canvas.classList.remove('drawing');
        drawLineBtn.classList.remove('ring-2', 'ring-indigo-500', 'bg-indigo-100', 'dark:bg-indigo-900/40');
      }
    }

    drawLineBtn.addEventListener('click', () => {
      setDrawingMode(!drawingMode);
    });

    /* ----------------- Freehand drawing ----------------- */
    function setFreeDrawMode(active) {
      freeDrawMode = active;
      if (active) {
        setDrawingMode(false);
        drawingSvg.classList.add('drawing');
        canvas.classList.add('free-drawing');
        freeDrawBtn.classList.add('ring-2', 'ring-indigo-500', 'bg-indigo-100', 'dark:bg-indigo-900/40');
      } else {
        drawingSvg.classList.remove('drawing');
        canvas.classList.remove('free-drawing');
        freeDrawBtn.classList.remove('ring-2', 'ring-indigo-500', 'bg-indigo-100', 'dark:bg-indigo-900/40');
        if (freeDrawState) endFreeDraw();
      }
    }

    freeDrawBtn.addEventListener('click', () => {
      setFreeDrawMode(!freeDrawMode);
    });

    function getCanvasPoint(e) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: e.clientX - rect.left + canvas.scrollLeft,
        y: e.clientY - rect.top + canvas.scrollTop
      };
    }

    function startFreeDraw(e) {
      if (!freeDrawMode) return;
      if (e.button !== 0) return;
      if (e.target.closest('.note-block') || e.target.closest('.socket')) return;
      e.preventDefault();

      const pt = getCanvasPoint(e);
      const stroke = {
        id: nextDrawingId++,
        color: lineColorSelect.value,
        width: 3,
        points: [pt]
      };
      freeDrawings.push(stroke);
      freeDrawState = { stroke, currentPath: null };

      renderStroke(stroke);
      freeDrawState.currentPath = document.getElementById(`stroke-${stroke.id}`);
    }

    function updateFreeDraw(e) {
      if (!freeDrawState) return;
      e.preventDefault();
      const pt = getCanvasPoint(e);
      freeDrawState.stroke.points.push(pt);
      updateStrokePath(freeDrawState.stroke, freeDrawState.currentPath);
    }

    function endFreeDraw() {
      if (!freeDrawState) return;
      freeDrawState = null;
      saveWorkspace();
    }

    function pointsToPath(points) {
      if (!points.length) return '';
      let d = `M ${points[0].x} ${points[0].y}`;
      for (let i = 1; i < points.length; i++) {
        d += ` L ${points[i].x} ${points[i].y}`;
      }
      return d;
    }

    function renderStroke(stroke) {
      const existing = document.getElementById(`stroke-${stroke.id}`);
      if (existing) existing.remove();

      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      g.id = `stroke-${stroke.id}`;
      g.classList.add('stroke-group');
      g.dataset.strokeId = stroke.id;

      const color = getThemeColor(stroke.color);
      const d = pointsToPath(stroke.points);

      const hit = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      hit.setAttribute('d', d);
      hit.setAttribute('class', 'free-stroke-hit');
      hit.setAttribute('stroke-width', (stroke.width + 12));

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', d);
      path.setAttribute('class', 'free-stroke');
      path.setAttribute('stroke', color);
      path.setAttribute('stroke-width', stroke.width);

      g.appendChild(hit);
      g.appendChild(path);
      drawingSvg.appendChild(g);

      g.addEventListener('dblclick', () => deleteStroke(stroke.id));
    }

    function updateStrokePath(stroke, el) {
      if (!el) el = document.getElementById(`stroke-${stroke.id}`);
      if (!el) return;
      const d = pointsToPath(stroke.points);
      const paths = el.querySelectorAll('path');
      paths.forEach(p => p.setAttribute('d', d));
    }

    function renderStrokes() {
      drawingSvg.querySelectorAll('.stroke-group').forEach(el => el.remove());
      freeDrawings.forEach(s => renderStroke(s));
    }

    function deleteStroke(id) {
      freeDrawings = freeDrawings.filter(s => s.id !== id);
      document.getElementById(`stroke-${id}`)?.remove();
      saveWorkspace();
      updateEmptyState();
    }

    /* ----------------- Dragging ----------------- */
    function startDrag(e, block, el) {
      if (e.button !== 0) return;
      if (e.target.closest('.delete-btn') || e.target.closest('.socket')) return;
      if (e.target.closest('.block-content')) return;

      e.preventDefault();
      el.setPointerCapture(e.pointerId);
      el.classList.add('dragging');

      dragState = {
        block, el,
        startX: e.clientX, startY: e.clientY,
        initialLeft: block.x, initialTop: block.y
      };

      el.addEventListener('pointermove', onDragMove);
      el.addEventListener('pointerup', onDragEnd);
      el.addEventListener('pointercancel', onDragEnd);
    }

    function onDragMove(e) {
      if (!dragState) return;
      e.preventDefault();
      const dx = e.clientX - dragState.startX;
      const dy = e.clientY - dragState.startY;
      dragState.block.x = Math.max(0, dragState.initialLeft + dx);
      dragState.block.y = Math.max(0, dragState.initialTop + dy);
      dragState.el.style.left = `${dragState.block.x}px`;
      dragState.el.style.top = `${dragState.block.y}px`;
      updateConnectionsRealtime();
    }

    function onDragEnd(e) {
      if (!dragState) return;
      const { el } = dragState;
      el.classList.remove('dragging');
      el.releasePointerCapture(e.pointerId);
      el.removeEventListener('pointermove', onDragMove);
      el.removeEventListener('pointerup', onDragEnd);
      el.removeEventListener('pointercancel', onDragEnd);
      dragState = null;
      saveWorkspace();
    }

    /* ----------------- Resizing ----------------- */
    function startResize(e, block, el) {
      if (e.button !== 0) return;
      e.preventDefault();
      e.stopPropagation();
      el.setPointerCapture(e.pointerId);
      el.classList.add('resizing');

      resizeState = {
        block, el,
        startX: e.clientX, startY: e.clientY,
        initialWidth: block.width, initialHeight: block.height
      };

      el.addEventListener('pointermove', onResizeMove);
      el.addEventListener('pointerup', onResizeEnd);
      el.addEventListener('pointercancel', onResizeEnd);
    }

    function onResizeMove(e) {
      if (!resizeState) return;
      e.preventDefault();
      const dx = e.clientX - resizeState.startX;
      const dy = e.clientY - resizeState.startY;

      let newW = Math.max(120, resizeState.initialWidth + dx);
      let newH = Math.max(80, resizeState.initialHeight + dy);

      if (resizeState.block.type === 'image') {
        const ratio = resizeState.initialWidth / resizeState.initialHeight;
        if (Math.abs(dx / resizeState.initialWidth) > Math.abs(dy / resizeState.initialHeight)) {
          newH = newW / ratio;
        } else {
          newW = newH * ratio;
        }
      }

      resizeState.block.width = newW;
      resizeState.block.height = newH;
      resizeState.el.style.width = `${newW}px`;
      resizeState.el.style.height = `${newH}px`;
      updateConnectionsRealtime();
    }

    function onResizeEnd(e) {
      if (!resizeState) return;
      const { el } = resizeState;
      el.classList.remove('resizing');
      el.releasePointerCapture(e.pointerId);
      el.removeEventListener('pointermove', onResizeMove);
      el.removeEventListener('pointerup', onResizeEnd);
      el.removeEventListener('pointercancel', onResizeEnd);
      resizeState = null;
      saveWorkspace();
    }

    /* ----------------- Text formatting ----------------- */
    function handleTextKeydown(e, content, block) {
      if (e.ctrlKey && !e.shiftKey && !e.altKey) {
        const key = e.key.toLowerCase();
        if (['b','i','u'].includes(key)) {
          e.preventDefault();
          document.execCommand(key === 'b' ? 'bold' : key === 'i' ? 'italic' : 'underline');
          block.content = content.innerHTML;
          saveWorkspace();
          return;
        }
      }

      if (e.key === 'Enter') {
        const selection = window.getSelection();
        const node = selection.anchorNode;
        if (!node) return;

        const line = node.nodeType === Node.TEXT_NODE ? node.parentElement : node;
        // Let the delegated canvas listener handle Enter inside todo items
        if (line.closest('.todo-item')) return;

        const lineText = (line.textContent || '').replace(/\u200B/g, '');

        const bulletMatch = lineText.match(/^(\s*)([-*])\s(.*)$/);
        const numberMatch = lineText.match(/^(\s*)(\d+)\.\s(.*)$/);

        if (bulletMatch && selection.anchorOffset === lineText.length) {
          e.preventDefault();
          const [, indent, marker, text] = bulletMatch;
          if (text.trim() === '') {
            line.textContent = '';
            insertNewLine(content);
          } else {
            const newLine = document.createElement('div');
            newLine.textContent = `${indent}${marker} `;
            insertNodeAfterLine(line, newLine);
          }
          block.content = content.innerHTML;
          saveWorkspace();
          return;
        }

        if (numberMatch && selection.anchorOffset === lineText.length) {
          e.preventDefault();
          const [, indent, num, text] = numberMatch;
          if (text.trim() === '') {
            line.textContent = '';
            insertNewLine(content);
          } else {
            const newLine = document.createElement('div');
            newLine.textContent = `${indent}${parseInt(num, 10) + 1}. `;
            insertNodeAfterLine(line, newLine);
          }
          block.content = content.innerHTML;
          saveWorkspace();
          return;
        }
      }
    }

    function insertNodeAfterLine(line, newLine) {
      const range = document.createRange();
      range.setStartAfter(line);
      range.collapse(true);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
      range.insertNode(newLine);
      range.setStart(newLine.firstChild, newLine.textContent.length);
      range.collapse(true);
      sel.removeAllRanges();
      sel.addRange(range);
    }

    function insertNewLine(content) {
      const sel = window.getSelection();
      const range = sel.getRangeAt(0);
      const br = document.createElement('br');
      range.deleteContents();
      range.insertNode(br);
      range.setStartAfter(br);
      range.collapse(true);
      sel.removeAllRanges();
      sel.addRange(range);
    }

    /* ----------------- Auto bullet detection ----------------- */
    canvas.addEventListener('input', (e) => {
      const content = e.target.closest('.block-content');
      if (!content) return;

      const block = blocks.find(b => `block-${b.id}` === content.parentElement.id);
      if (!block) return;

      const selection = window.getSelection();
      const node = selection.anchorNode;
      if (node && node.nodeType === Node.TEXT_NODE) {
        const text = node.textContent;
        const line = node.parentElement;
        if (!line.closest('.todo-item, .table-container')) {
          if (/^[-*] $/.test(text)) {
            e.preventDefault();
            const newLine = document.createElement('div');
            const bullet = document.createElement('span');
            bullet.textContent = '• ';
            bullet.style.fontWeight = 'bold';
            newLine.appendChild(bullet);
            const space = document.createTextNode('\u00A0');
            newLine.appendChild(space);
            line.replaceWith(newLine);

            const range = document.createRange();
            range.setStart(space, 1);
            range.collapse(true);
            selection.removeAllRanges();
            selection.addRange(range);

            block.content = content.innerHTML;
            saveWorkspace();
            return;
          }

          if (/^\d+\. $/.test(text)) {
            const num = text.match(/^\d+/)[0];
            const newLine = document.createElement('div');
            newLine.textContent = `${num}. \u00A0`;
            line.replaceWith(newLine);

            const range = document.createRange();
            range.setStart(newLine.firstChild, newLine.textContent.length);
            range.collapse(true);
            selection.removeAllRanges();
            selection.addRange(range);

            block.content = content.innerHTML;
            saveWorkspace();
            return;
          }

          if (/^- \[([ xX]?)\] $/.test(text)) {
            const checked = /[xX]/.test(text);
            const newItem = createTodoItem(checked, '');
            line.replaceWith(newItem);

            const textSpan = newItem.querySelector('.todo-text');
            const range = document.createRange();
            range.setStart(textSpan, 0);
            range.collapse(true);
            selection.removeAllRanges();
            selection.addRange(range);

            block.content = content.innerHTML;
            saveWorkspace();
            return;
          }
        }
      }

      styleHeaderLinks();
      block.content = content.innerHTML;
      saveWorkspace();
      detectHeadersAndCreateSubPages();
    });

    canvas.addEventListener('keyup', (e) => {
      const content = e.target.closest('.block-content');
      if (!content) return;
      const block = blocks.find(b => `block-${b.id}` === content.parentElement.id);
      if (!block) return;

      const sel = window.getSelection();
      if (!sel.rangeCount) return;
      const range = sel.getRangeAt(0);

      const { query, startNode, startOffset } = detectAtQuery(range, content);
      if (query !== null) {
        showAutocompleteDropdown(content, block, query, startNode, startOffset);
      } else {
        hideAutocompleteDropdown();
        parseProjectLinks(content, block);
      }
      styleHeaderLinks();
    });

    canvas.addEventListener('keydown', (e) => {
      if (!autocompleteState) return;
      if (!['ArrowDown', 'ArrowUp', 'Enter', 'Tab', 'Escape'].includes(e.key)) return;

      e.preventDefault();
      if (e.key === 'ArrowDown') {
        autocompleteState.activeIndex = Math.min(autocompleteState.activeIndex + 1, Math.max(autocompleteState.items.length - 1, 0));
        renderAutocompleteDropdown();
      } else if (e.key === 'ArrowUp') {
        autocompleteState.activeIndex = Math.max(autocompleteState.activeIndex - 1, 0);
        renderAutocompleteDropdown();
      } else if (e.key === 'Enter' || e.key === 'Tab') {
        selectAutocompleteItem(autocompleteState.activeIndex);
      } else if (e.key === 'Escape') {
        hideAutocompleteDropdown();
      }
    });

    autocompleteDropdown.addEventListener('click', (e) => {
      const item = e.target.closest('.autocomplete-item');
      if (!item) return;
      if (item.dataset.action === 'create-new') {
        selectAutocompleteItem(0);
      } else {
        selectAutocompleteItem(parseInt(item.dataset.index, 10));
      }
    });

    /* ----------------- Smart Paste: URLs → Hyperlinks ----------------- */
    canvas.addEventListener('paste', (e) => {
      const content = e.target.closest('.block-content');
      if (!content) return;
      const block = blocks.find(b => `block-${b.id}` === content.parentElement.id);
      if (!block) return;

      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData('text');
      const trimmed = text.trim();
      const urlRegex = /^(https?:\/\/[^\s]+)$/i;

      if (urlRegex.test(trimmed)) {
        const safeUrl = escapeHtml(trimmed);
        const linkHTML = `<a href="${safeUrl}" target="_blank" rel="noopener noreferrer" class="url-link text-sky-500 hover:text-sky-400 dark:text-sky-400 dark:hover:text-sky-300 underline underline-offset-4 transition-colors" contenteditable="false">${safeUrl}</a>&nbsp;`;
        document.execCommand('insertHTML', false, linkHTML);
      } else {
        document.execCommand('insertText', false, text);
      }

      block.content = content.innerHTML;
      saveWorkspace();
    });

    /* ----------------- Code Block: overlay events ----------------- */
    canvas.addEventListener('input', (e) => {
      const textarea = e.target.closest('.code-textarea');
      if (!textarea) return;
      const wrapper = textarea.closest('.code-block-wrapper');
      const select = wrapper?.querySelector('.code-lang-select');
      const codeDisplay = wrapper?.querySelector('.code-display');
      if (select && codeDisplay) {
        syncCodeDisplay(textarea, codeDisplay, select.value);
      }
      syncCodeBlockState(textarea);
    });

    canvas.addEventListener('paste', (e) => {
      const textarea = e.target.closest('.code-textarea');
      if (!textarea) return;
      // Standard textarea paste is handled natively; sync after paste
      requestAnimationFrame(() => {
        const wrapper = textarea.closest('.code-block-wrapper');
        const select = wrapper?.querySelector('.code-lang-select');
        const codeDisplay = wrapper?.querySelector('.code-display');
        if (select && codeDisplay) {
          syncCodeDisplay(textarea, codeDisplay, select.value);
        }
        syncCodeBlockState(textarea);
      });
    });

    canvas.addEventListener('keydown', (e) => {
      const textarea = e.target.closest('.code-textarea');
      if (!textarea || e.key !== 'Tab') return;
      if (textarea.closest('.independent-code-card')) return;
      e.preventDefault();
      const start = textarea.selectionStart;
      const end = textarea.selectionEnd;
      const value = textarea.value;
      textarea.value = value.substring(0, start) + '  ' + value.substring(end);
      textarea.selectionStart = textarea.selectionEnd = start + 2;
      syncCodeBlockState(textarea);
    });

    canvas.addEventListener('change', (e) => {
      const select = e.target.closest('.code-lang-select');
      if (!select) return;
      const wrapper = select.closest('.code-block-wrapper');
      const textarea = wrapper?.querySelector('.code-textarea');
      const content = wrapper?.closest('.block-content');
      const block = content ? getBlockFromContent(content) : null;
      if (textarea) {
        textarea.dataset.language = select.value;
        updateCodeBlockDisplay(textarea);
      }
      if (block) {
        block.content = content.innerHTML;
        saveWorkspace();
      }
    });

    canvas.addEventListener('click', (e) => {
      const copyBtn = e.target.closest('.code-copy-btn');
      if (!copyBtn) return;
      e.preventDefault();
      e.stopPropagation();

      const wrapper = copyBtn.closest('.code-block-wrapper');
      const textarea = wrapper?.querySelector('.code-textarea');
      if (!textarea) return;

      navigator.clipboard.writeText(textarea.value).then(() => {
        const original = copyBtn.innerHTML;
        copyBtn.classList.add('copied');
        copyBtn.innerHTML = '<span>Kopyalandı!</span>';
        setTimeout(() => {
          copyBtn.classList.remove('copied');
          copyBtn.innerHTML = original;
        }, 1500);
      }).catch(err => {
        console.error('Failed to copy code', err);
      });
    });

    /* ----------------- Image upload ----------------- */
    function processImageFile(file, x, y) {
      if (!file || !file.type.startsWith('image/')) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
          const maxW = 500;
          const ratio = img.width / img.height;
          const w = Math.min(maxW, img.width);
          const h = w / ratio;
          createBlock('image', ev.target.result, x, y, w, h);
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    }

    addImageBtn.addEventListener('click', () => imageInput.click());

    imageInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const x = pendingImageDrop ? pendingImageDrop.x : canvas.scrollLeft + 40;
      const y = pendingImageDrop ? pendingImageDrop.y : canvas.scrollTop + 40;
      processImageFile(file, x, y);
      pendingImageDrop = null;
      imageInput.value = '';
    });

    /* ----------------- Canvas drag & drop ----------------- */
    canvas.addEventListener('dragover', (e) => {
      e.preventDefault();
      canvas.classList.add('drag-over');
    });

    canvas.addEventListener('dragleave', (e) => {
      if (e.target === canvas) canvas.classList.remove('drag-over');
    });

    canvas.addEventListener('drop', (e) => {
      e.preventDefault();
      canvas.classList.remove('drag-over');

      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left + canvas.scrollLeft;
      const y = e.clientY - rect.top + canvas.scrollTop;

      const files = Array.from(e.dataTransfer.files);
      const imageFiles = files.filter(f => /image\/(png|jpeg|jpg|gif)/i.test(f.type));

      imageFiles.forEach((file, i) => {
        processImageFile(file, x + i * 30, y + i * 30);
      });
    });

    /* ----------------- Add text ----------------- */
    addTextBtn.addEventListener('click', () => {
      const block = createBlock('text');
      const content = document.querySelector(`#block-${block.id} .block-content`);
      if (content) content.focus();
    });

    /* ----------------- Page management ----------------- */
    newPageBtn.addEventListener('click', () => {
      const title = prompt('Enter page name:', 'New Page');
      if (title !== null && title.trim() !== '') {
        createPage(title.trim());
      }
    });

    toggleSidebar.addEventListener('click', () => {
      sidebarCollapsed = !sidebarCollapsed;
      sidebar.classList.toggle('collapsed', sidebarCollapsed);
      sidebar.querySelector('.sidebar-icon-open').classList.toggle('hidden', sidebarCollapsed);
      sidebar.querySelector('.sidebar-icon-closed').classList.toggle('hidden', !sidebarCollapsed);
    });

    /* ----------------- Clear canvas ----------------- */
    clearBtn.addEventListener('click', () => {
      if (!blocks.length && !connections.length && !freeDrawings.length && !independentCodeCards.length) return;
      if (confirm('Clear the current page? This cannot be undone.')) {
        blocks = [];
        connections = [];
        freeDrawings = [];
        independentCodeCards = [];
        document.querySelectorAll('.note-block').forEach(el => el.remove());
        document.querySelectorAll('.independent-code-card').forEach(el => el.remove());
        renderConnections();
        renderStrokes();
        nextId = 1;
        nextConnId = 1;
        nextDrawingId = 1;
        nextCodeCardId = 1;
        saveWorkspace();
        updateEmptyState();
      }
    });

    /* ----------------- Canvas free drawing events ----------------- */
    canvas.addEventListener('pointerdown', (e) => {
      if (e.target.closest('.note-block')) return;
      startFreeDraw(e);
    });
    canvas.addEventListener('pointermove', updateFreeDraw);
    canvas.addEventListener('pointerup', endFreeDraw);
    canvas.addEventListener('pointercancel', endFreeDraw);
    canvas.addEventListener('pointerleave', endFreeDraw);

    /* ----------------- Interactive Todo Checkboxes (Event Delegation) ----------------- */
    function getBlockFromContent(content) {
      return blocks.find(b => `block-${b.id}` === content.parentElement.id);
    }

    canvas.addEventListener('click', (e) => {
      const linkTag = e.target.closest('.project-link-tag');
      if (linkTag) {
        e.preventDefault();
        e.stopPropagation();
        const targetPageId = linkTag.dataset.targetPageId;
        if (targetPageId && targetPageId !== currentPageId) {
          switchPage(targetPageId);
        }
        return;
      }

      const urlLink = e.target.closest('.url-link');
      if (urlLink) {
        e.stopPropagation();
        window.open(urlLink.href, '_blank', 'noopener,noreferrer');
        return;
      }

      const badge = e.target.closest('.header-badge');
      if (badge) {
        const match = badge.textContent.match(/^# (.+)/);
        if (match) {
          const pageTitle = match[1].trim();
          const subPage = pagesData.pagesList.find(p => p.parentId === currentPageId && p.title === pageTitle);
          if (subPage && subPage.id !== currentPageId) {
            e.preventDefault();
            e.stopPropagation();
            switchPage(subPage.id);
            return;
          }
        }
      }

      const addColBtn = e.target.closest('.table-add-col');
      if (addColBtn) {
        e.preventDefault();
        e.stopPropagation();
        const container = addColBtn.closest('.table-container');
        const table = container?.querySelector('table');
        const content = container?.closest('.block-content');
        const block = content ? getBlockFromContent(content) : null;
        if (table) {
          addTableColumn(table);
          lucide.createIcons({ parent: container });
          if (block) {
            block.content = content.innerHTML;
            saveWorkspace();
          }
        }
        return;
      }

      const addRowBtn = e.target.closest('.table-add-row');
      if (addRowBtn) {
        e.preventDefault();
        e.stopPropagation();
        const container = addRowBtn.closest('.table-container');
        const table = container?.querySelector('table');
        const content = container?.closest('.block-content');
        const block = content ? getBlockFromContent(content) : null;
        if (table) {
          addTableRow(table);
          if (block) {
            block.content = content.innerHTML;
            saveWorkspace();
          }
        }
        return;
      }

      const checkbox = e.target.closest('.todo-checkbox');
      if (!checkbox) return;
      e.preventDefault();
      e.stopPropagation();

      const item = checkbox.closest('.todo-item');
      const text = item.querySelector('.todo-text');
      if (!item || !text) return;

      const isChecked = checkbox.dataset.checked === 'true';
      if (!isChecked) {
        checkbox.dataset.checked = 'true';
        checkbox.className = 'todo-checkbox cursor-pointer flex items-center justify-center w-5 h-5 rounded-full bg-emerald-500 border border-emerald-500 transition-all duration-200';
        checkbox.innerHTML = '<svg class="w-3.5 h-3.5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>';
        text.classList.add('line-through', 'text-slate-400', 'dark:text-slate-500');
      } else {
        checkbox.dataset.checked = 'false';
        checkbox.className = 'todo-checkbox cursor-pointer flex items-center justify-center w-5 h-5 rounded-full border border-slate-400 dark:border-slate-500 transition-all duration-200';
        checkbox.innerHTML = '';
        text.classList.remove('line-through', 'text-slate-400', 'dark:text-slate-500');
      }

      const content = item.closest('.block-content');
      const block = content ? getBlockFromContent(content) : null;
      if (block) {
        block.content = content.innerHTML;
        saveWorkspace();
      }
    });

    canvas.addEventListener('keydown', (e) => {
      if (!e.target.classList.contains('todo-text') || e.key !== 'Enter') return;
      e.preventDefault();

      const currentText = e.target;
      const currentItem = currentText.closest('.todo-item');
      const content = currentItem.closest('.block-content');
      const block = content ? getBlockFromContent(content) : null;
      const text = currentText.textContent.trim();

      if (text === '') {
        const p = document.createElement('div');
        p.className = 'outline-none my-1';
        p.contentEditable = 'true';
        p.innerHTML = '<br>';
        currentItem.replaceWith(p);
        p.focus();
        const range = document.createRange();
        range.setStart(p, 0);
        range.collapse(true);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
      } else {
        const newTodo = createTodoItem(false, '');
        currentItem.after(newTodo);
        const newText = newTodo.querySelector('.todo-text');
        if (newText) {
          newText.focus();
          const range = document.createRange();
          range.setStart(newText, 0);
          range.collapse(true);
          const sel = window.getSelection();
          sel.removeAllRanges();
          sel.addRange(range);
        }
      }

      if (block) {
        block.content = content.innerHTML;
        saveWorkspace();
      }
    });

    /* ----------------- Double-click to add text ----------------- */
    canvas.addEventListener('dblclick', (e) => {
      if (freeDrawMode) return;
      if (e.target !== canvas && !e.target.closest('#emptyState')) return;
      const x = e.clientX - canvas.getBoundingClientRect().left + canvas.scrollLeft;
      const y = e.clientY - canvas.getBoundingClientRect().top + canvas.scrollTop;
      const block = createBlock('text', '', x, y);
      const content = document.querySelector(`#block-${block.id} .block-content`);
      if (content) content.focus();
    });

    /* ----------------- Context Menu ----------------- */
    function showContextMenu(x, y, target) {
      contextTarget = target ? { ...target, x, y } : { x, y };
      const isBlock = target && target.block;
      const isContent = target && target.content;

      const sel = window.getSelection();
      savedSelectionRange = (sel && sel.rangeCount > 0 && !sel.isCollapsed) ? sel.getRangeAt(0).cloneRange() : null;

      ctxGlobal.classList.toggle('hidden', isBlock);
      ctxBlock.classList.toggle('hidden', !isBlock);

      contextMenu.classList.remove('hidden');
      requestAnimationFrame(() => {
        const rect = contextMenu.getBoundingClientRect();
        const winW = window.innerWidth;
        const winH = window.innerHeight;
        let left = x;
        let top = y;
        if (left + rect.width > winW) left = winW - rect.width - 8;
        if (top + rect.height > winH) top = winH - rect.height - 8;
        if (left < 8) left = 8;
        if (top < 8) top = 8;
        contextMenu.style.left = `${left}px`;
        contextMenu.style.top = `${top}px`;
        contextMenu.classList.add('open');

        // Highlight current block options
        contextMenu.querySelectorAll('.color-dot.active, .font-size-btn.active').forEach(el => el.classList.remove('active'));
        if (contextTarget?.block) {
          const colorBtn = contextMenu.querySelector(`[data-action="color${capitalize(contextTarget.block.bgColor)}"]`);
          const sizeBtn = contextMenu.querySelector(`[data-action="font${capitalize(contextTarget.block.fontSize)}"]`);
          if (colorBtn) colorBtn.classList.add('active');
          if (sizeBtn) sizeBtn.classList.add('active');
        }

        lucide.createIcons({ parent: contextMenu });
      });
    }

    function capitalize(str) {
      if (!str) return '';
      return str.charAt(0).toUpperCase() + str.slice(1);
    }

    function hideContextMenu() {
      contextMenu.classList.remove('open');
      setTimeout(() => {
        if (!contextMenu.classList.contains('open')) {
          contextMenu.classList.add('hidden');
          contextTarget = null;
        }
      }, 120);
    }

    function prefixCurrentLine(content, prefix) {
      const selection = window.getSelection();
      const node = selection.anchorNode;
      if (!node) return;
      const line = node.nodeType === Node.TEXT_NODE ? node.parentElement : node;
      const text = line.textContent || '';
      const range = document.createRange();
      range.selectNodeContents(line);
      range.deleteContents();
      line.textContent = prefix;
      range.setStart(line.firstChild, prefix.length);
      range.collapse(true);
      selection.removeAllRanges();
      selection.addRange(range);
      content.dispatchEvent(new Event('input', { bubbles: true }));
    }

    function applyFormat(command) {
      if (!contextTarget || !contextTarget.content) return;
      document.execCommand(command);
      contextTarget.block.content = contextTarget.content.innerHTML;
      saveWorkspace();
    }

    function setBlockColor(colorName) {
      if (!contextTarget || !contextTarget.block) return;
      contextTarget.block.bgColor = colorName;
      const el = document.getElementById(`block-${contextTarget.block.id}`);
      if (el) {
        const allBgClasses = [
          'bg-white', 'dark:bg-slate-800',
          'bg-slate-100', 'dark:bg-slate-700',
          'bg-blue-100', 'dark:bg-blue-900/40',
          'bg-red-100', 'dark:bg-red-900/40',
          'bg-green-100', 'dark:bg-green-900/40',
          'bg-yellow-100', 'dark:bg-yellow-900/40'
        ];
        allBgClasses.forEach(c => el.classList.remove(...c.split(' ')));
        getBlockBgClass(colorName).split(' ').forEach(c => el.classList.add(c));
      }
      saveWorkspace();
    }

    function setBlockFontSize(sizeName) {
      if (!contextTarget || !contextTarget.block) return;
      contextTarget.block.fontSize = sizeName;
      const content = document.querySelector(`#block-${contextTarget.block.id} .block-content`);
      if (content) content.style.fontSize = getBlockFontSize(sizeName);
      saveWorkspace();
    }

    document.addEventListener('contextmenu', (e) => {
      // Allow native context menu inside code/inspect contexts only with Shift key
      if (e.shiftKey) return;
      if (e.target.closest('#context-menu')) return;
      e.preventDefault();

      const blockEl = e.target.closest('.note-block');
      const contentEl = e.target.closest('.block-content');

      if (blockEl) {
        const blockId = parseInt(blockEl.id.replace('block-', ''), 10);
        const block = blocks.find(b => b.id === blockId);
        if (block) {
          showContextMenu(e.clientX, e.clientY, { block, content: contentEl });
          return;
        }
      }

      showContextMenu(e.clientX, e.clientY, null);
    });

    contextMenu.addEventListener('click', (e) => {
      e.stopPropagation();
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      const action = btn.dataset.action;
      handleContextAction(action, btn);
      hideContextMenu();
    });

    function handleContextAction(action, btn) {
      switch (action) {
        case 'addText': {
          const rect = canvas.getBoundingClientRect();
          const bx = (contextTarget?.x || rect.left + 40) - rect.left + canvas.scrollLeft;
          const by = (contextTarget?.y || rect.top + 40) - rect.top + canvas.scrollTop;
          const block = createBlock('text', '', bx, by);
          const content = document.querySelector(`#block-${block.id} .block-content`);
          if (content) content.focus();
          break;
        }
        case 'addImage': {
          const rect = canvas.getBoundingClientRect();
          pendingImageDrop = {
            x: (contextTarget?.x || rect.left + 40) - rect.left + canvas.scrollLeft,
            y: (contextTarget?.y || rect.top + 40) - rect.top + canvas.scrollTop
          };
          imageInput.click();
          break;
        }
        case 'clear':
          clearBtn.click();
          break;
        case 'createCodeCard': {
          const cx = contextTarget?.x || (canvas.getBoundingClientRect().left + 40 + canvas.scrollLeft);
          const cy = contextTarget?.y || (canvas.getBoundingClientRect().top + 40 + canvas.scrollTop);
          createIndependentCodeCard(cx, cy);
          break;
        }
        case 'bullet':
          if (contextTarget?.content) prefixCurrentLine(contextTarget.content, '• ');
          break;
        case 'numbered':
          if (contextTarget?.content) prefixCurrentLine(contextTarget.content, '1. ');
          break;
        case 'checkbox': {
          if (!contextTarget?.content || !contextTarget?.block) return;
          const selection = window.getSelection();
          const node = selection.anchorNode;
          let ref = node?.nodeType === Node.TEXT_NODE ? node.parentElement : node;
          // Find the top-level child of the content editor
          while (ref && ref.parentElement !== contextTarget.content) {
            ref = ref.parentElement;
          }
          const newTodo = createTodoItem(false, '');
          if (ref && ref !== contextTarget.content) {
            ref.after(newTodo);
          } else {
            contextTarget.content.appendChild(newTodo);
          }
          const textSpan = newTodo.querySelector('.todo-text');
          if (textSpan) {
            textSpan.focus();
            const range = document.createRange();
            range.setStart(textSpan, 0);
            range.collapse(true);
            selection.removeAllRanges();
            selection.addRange(range);
          }
          contextTarget.block.content = contextTarget.content.innerHTML;
          saveWorkspace();
          break;
        }
        case 'table': {
          if (!contextTarget?.content || !contextTarget?.block) return;
          insertTableAtCursor(contextTarget.content, contextTarget.block);
          break;
        }
        case 'bold':
          applyFormat('bold');
          break;
        case 'italic':
          applyFormat('italic');
          break;
        case 'underline':
          applyFormat('underline');
          break;
        case 'linkProject': {
          if (!contextTarget?.content || !contextTarget?.block) return;
          const selectedText = savedSelectionRange ? savedSelectionRange.toString().trim() : '';
          const defaultTitle = selectedText || contextTarget.block.content?.replace(/<[^>]*>/g, '').slice(0, 30) || '';
          const pageTitle = prompt('Link to page:', defaultTitle);
          if (!pageTitle) return;
          const page = findPageByTitle(pageTitle);
          if (!page) {
            alert(`No page named "${pageTitle}" found.`);
            return;
          }
          const displayText = selectedText || pageTitle;
          if (savedSelectionRange) {
            savedSelectionRange.deleteContents();
            const badge = createProjectLink(page.id, page.title, displayText);
            savedSelectionRange.insertNode(badge);
            const space = document.createTextNode('\u00A0');
            badge.after(space);
          } else {
            const badge = createProjectLink(page.id, page.title, displayText);
            const space = document.createTextNode('\u00A0');
            contextTarget.content.appendChild(badge);
            contextTarget.content.appendChild(space);
          }
          lucide.createIcons({ parent: contextTarget.content });
          contextTarget.block.content = contextTarget.content.innerHTML;
          saveWorkspace();
          break;
        }
        case 'codeBlock': {
          if (!contextTarget?.content || !contextTarget?.block) return;
          insertCodeBlockAtCursor(contextTarget.content, contextTarget.block, 'javascript');
          break;
        }
        case 'fontSmall':
          setBlockFontSize('small');
          break;
        case 'fontMedium':
          setBlockFontSize('medium');
          break;
        case 'fontLarge':
          setBlockFontSize('large');
          break;
        case 'fontXl':
          setBlockFontSize('xl');
          break;
        case 'colorWhite':
        case 'colorSlate':
        case 'colorBlue':
        case 'colorRed':
        case 'colorGreen':
        case 'colorYellow':
          setBlockColor(action.replace('color', '').toLowerCase());
          break;
        case 'deleteBlock':
          if (contextTarget?.block) deleteBlock(contextTarget.block.id);
          break;
      }
    }

    document.addEventListener('click', (e) => {
      if (!contextMenu.contains(e.target)) hideContextMenu();
      if (!autocompleteDropdown.contains(e.target) && !e.target.closest('.block-content')) {
        hideAutocompleteDropdown();
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        hideContextMenu();
        hideAutocompleteDropdown();
      }
    });

    /* ----------------- Window resize ----------------- */
    window.addEventListener('resize', () => {
      renderConnections();
      renderStrokes();
      hideContextMenu();
      hideAutocompleteDropdown();
    });

    /* ----------------- Shortcuts Panel ----------------- */
    const shortcutsPanelHTML = `
      <div id="shortcutsPanel-overlay" class="hidden"></div>
      <div id="shortcutsPanel" class="hidden bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-4">
        <div class="flex items-center justify-between mb-3">
          <h3 class="text-sm font-bold text-slate-700 dark:text-slate-200">Keyboard Shortcuts</h3>
          <div class="flex gap-2">
            <button id="resetShortcutsBtn" class="text-xs px-2 py-1 rounded bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-600 transition">Reset</button>
            <button id="closeShortcutsPanel" class="text-xs px-2 py-1 rounded bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-600 transition">Close</button>
          </div>
        </div>
        <div id="shortcutsList" class="space-y-1"></div>
        <p class="text-xs text-slate-400 dark:text-slate-500 mt-3">Click a shortcut badge to rebind. Press Escape to cancel.</p>
      </div>
    `;
    document.body.insertAdjacentHTML('beforeend', shortcutsPanelHTML);

    const shortcutsOverlay = document.getElementById('shortcutsPanel-overlay');
    const shortcutsPanelEl = document.getElementById('shortcutsPanel');
    const shortcutsList = document.getElementById('shortcutsList');
    const closeShortcutsPanel = document.getElementById('closeShortcutsPanel');
    const resetShortcutsBtn = document.getElementById('resetShortcutsBtn');
    const shortcutsBtn = document.getElementById('shortcutsBtn');

    let recordingId = null;

    function renderShortcutsPanel() {
      shortcutsList.innerHTML = '';
      for (const [id, sc] of Object.entries(shortcuts)) {
        const row = document.createElement('div');
        row.className = 'shortcut-row';
        const badge = document.createElement('span');
        badge.className = 'shortcut-key-badge';
        badge.dataset.shortcutId = id;
        badge.textContent = formatShortcut(sc);
        if (recordingId === id) badge.classList.add('recording');
        badge.addEventListener('click', (e) => {
          e.stopPropagation();
          startRecording(id);
        });
        row.innerHTML = `<span class="text-sm text-slate-600 dark:text-slate-300">${sc.desc}</span>`;
        row.appendChild(badge);
        shortcutsList.appendChild(row);
      }
    }

    function startRecording(id) {
      recordingId = id;
      renderShortcutsPanel();
      const handler = (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (e.key === 'Escape') { recordingId = null; renderShortcutsPanel(); document.removeEventListener('keydown', handler, true); return; }
        if (['Control', 'Shift', 'Alt', 'Meta'].includes(e.key)) return;
        const key = e.key === ' ' ? 'Space' : e.key;
        shortcuts[id] = { key, ctrl: !!e.ctrlKey, shift: !!e.shiftKey, alt: !!e.altKey, desc: shortcuts[id].desc };
        recordingId = null;
        saveShortcuts();
        renderShortcutsPanel();
        document.removeEventListener('keydown', handler, true);
      };
      document.addEventListener('keydown', handler, true);
    }

    function showShortcutsPanel() {
      renderShortcutsPanel();
      shortcutsOverlay.classList.remove('hidden');
      shortcutsPanelEl.classList.remove('hidden');
    }

    function hideShortcutsPanel() {
      recordingId = null;
      shortcutsOverlay.classList.add('hidden');
      shortcutsPanelEl.classList.add('hidden');
    }

    shortcutsBtn.addEventListener('click', showShortcutsPanel);
    closeShortcutsPanel.addEventListener('click', hideShortcutsPanel);
    shortcutsOverlay.addEventListener('click', hideShortcutsPanel);
    resetShortcutsBtn.addEventListener('click', () => { resetShortcuts(); renderShortcutsPanel(); });

    /* ----------------- Global Keydown Handler ----------------- */
    document.addEventListener('keydown', (e) => {
      if (!shortcutsPanelEl.classList.contains('hidden')) return;
      if (e.target.closest('.block-content[contenteditable], input, textarea, select')) return;

      for (const [id, sc] of Object.entries(shortcuts)) {
        if (shortcutMatches(e, sc)) {
          e.preventDefault();
          switch (id) {
            case 'newPage':
              const title = prompt('Enter page name:', 'New Page');
              if (title && title.trim()) createPage(title.trim());
              break;
            case 'newTextBlock':
              const block = createBlock('text');
              const content = document.querySelector(`#block-${block.id} .block-content`);
              if (content) content.focus();
              break;
            case 'deleteBlock':
              if (blocks.length > 0) {
                const last = blocks[blocks.length - 1];
                if (confirm(`Delete last block?`)) deleteBlock(last.id);
              }
              break;
            case 'toggleSide':
              toggleSidebar.click();
              break;
            case 'toggleTheme':
              themeToggle.click();
              break;
            case 'commandPal':
              showShortcutsPanel();
              break;
            case 'undo':
              undo();
              break;
            case 'redo':
              redo();
              break;
          }
          return;
        }
      }
    });

    /* ----------------- Init ----------------- */
    loadWorkspace();
    lucide.createIcons();
  </script>
</body>
</html>
