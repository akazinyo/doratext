<!DOCTYPE html>
<html lang="en" class="antialiased">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DoraNote — Not Defteri</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            slate: { 850: '#1e293b', 900: '#0f172a' }
          }
        }
      }
    }
  </script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Prism.js for code syntax highlighting -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-csharp.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>

  <!-- App Styles -->
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-100 transition-colors duration-300 h-screen flex flex-col overflow-hidden">

  <!-- Top Control Bar -->
  <nav class="sticky top-0 z-50 h-16 px-4 sm:px-6 flex items-center justify-between border-b border-slate-200 dark:border-slate-700 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md transition-colors duration-300">
    <div class="flex items-center gap-2.5">
      <i data-lucide="notebook-pen" class="w-7 h-7 text-indigo-500"></i>
      <h1 class="text-lg sm:text-xl font-bold tracking-tight">DoraNote</h1>
    </div>

    <div class="flex items-center gap-2 sm:gap-3">
      <button id="addTextBtn" class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium rounded-lg bg-indigo-600 text-white hover:bg-indigo-700 active:scale-95 transition">
        <i data-lucide="plus" class="w-4 h-4"></i>
        <span class="hidden sm:inline">Metin</span>
      </button>

      <button id="addImageBtn" class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium rounded-lg bg-emerald-600 text-white hover:bg-emerald-700 active:scale-95 transition">
        <i data-lucide="image-plus" class="w-4 h-4"></i>
        <span class="hidden sm:inline">Resim</span>
      </button>

      <div class="h-6 w-px bg-slate-300 dark:bg-slate-600 mx-1 hidden sm:block"></div>

      <button id="drawLineBtn" class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium rounded-lg bg-slate-200 text-slate-800 hover:bg-slate-300 dark:bg-slate-800 dark:text-slate-100 dark:hover:bg-slate-700 active:scale-95 transition" title="Bağlantı çizim modunu aç/kapat">
        <i data-lucide="pen-tool" class="w-4 h-4"></i>
        <span class="hidden sm:inline">Bağla</span>
      </button>

      <button id="freeDrawBtn" class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium rounded-lg bg-slate-200 text-slate-800 hover:bg-slate-300 dark:bg-slate-800 dark:text-slate-100 dark:hover:bg-slate-700 active:scale-95 transition" title="Serbest çizim modunu aç/kapat">
        <i data-lucide="pencil" class="w-4 h-4"></i>
        <span class="hidden sm:inline">Kalem</span>
      </button>

      <button id="eraserBtn" class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium rounded-lg bg-slate-200 text-slate-800 hover:bg-slate-300 dark:bg-slate-800 dark:text-slate-100 dark:hover:bg-slate-700 active:scale-95 transition" title="Silgi modunu aç/kapat">
        <i data-lucide="eraser" class="w-4 h-4"></i>
        <span class="hidden sm:inline">Silgi</span>
      </button>

      <select id="lineColor" class="hidden sm:block text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 px-2 py-1.5 focus:outline-none focus:ring-2 focus:ring-indigo-500">
        <option value="#334155">Siyah</option>
        <option value="#2563eb">Mavi</option>
        <option value="#dc2626">Kırmızı</option>
        <option value="#16a34a">Yeşil</option>
      </select>

      <select id="lineStyle" class="hidden sm:block text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 px-2 py-1.5 focus:outline-none focus:ring-2 focus:ring-indigo-500">
        <option value="straight">Düz</option>
        <option value="curved">Eğri</option>
        <option value="dashed">Kesikli</option>
      </select>

      <button id="clearBtn" class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium rounded-lg bg-slate-200 text-slate-800 hover:bg-slate-300 dark:bg-slate-800 dark:text-slate-100 dark:hover:bg-slate-700 active:scale-95 transition">
        <i data-lucide="trash-2" class="w-4 h-4"></i>
        <span class="hidden sm:inline">Temizle</span>
      </button>

      <button id="themeToggle" class="ml-1 p-2 rounded-lg bg-slate-200 text-slate-800 hover:bg-slate-300 dark:bg-slate-800 dark:text-slate-100 dark:hover:bg-slate-700 transition" aria-label="Temayı değiştir">
        <i data-lucide="moon" class="w-5 h-5 hidden"></i>
        <i data-lucide="sun" class="w-5 h-5"></i>
        <i data-lucide="monitor" class="w-5 h-5 hidden"></i>
      </button>
    </div>
  </nav>

  <!-- Hidden file input for image upload -->
  <input type="file" id="imageInput" accept="image/png, image/jpeg, image/jpg, image/gif" class="hidden" />

  <!-- Autocomplete Dropdown -->
  <div id="autocomplete-dropdown" class="hidden fixed z-[9999] min-w-[220px] max-w-[340px] bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg shadow-xl py-1 overflow-hidden">
    <div id="autocomplete-list" class="max-h-[260px] overflow-y-auto"></div>
  </div>

  <!-- Custom Context Menu -->
  <div id="context-menu" class="hidden bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 text-slate-800 dark:text-slate-100">
    <div id="ctxGlobal" class="p-1.5">
      <button class="context-item text-slate-700 dark:text-slate-200" data-action="addText">
        <i data-lucide="plus-square" class="w-4 h-4"></i> Metin Bloğu Ekle
      </button>
      <button class="context-item text-slate-700 dark:text-slate-200" data-action="addImage">
        <i data-lucide="image-plus" class="w-4 h-4"></i> Resim Bloğu Ekle
      </button>
      <button class="context-item text-slate-700 dark:text-slate-200" data-action="createCodeCard">
        <i data-lucide="code" class="w-4 h-4"></i> Kod Bloğu Oluştur
      </button>
      <div class="context-separator"></div>
      <button class="context-item text-slate-700 dark:text-slate-200" data-action="clear">
        <i data-lucide="trash-2" class="w-4 h-4"></i> Çalışma Alanını Temizle
      </button>
    </div>
    <div id="ctxBlock" class="hidden p-1.5">
      <div class="px-2 py-1 text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Liste Biçimi</div>
      <button class="context-item text-slate-700 dark:text-slate-200" data-action="bullet">
        <i data-lucide="list" class="w-4 h-4"></i> Madde İşaretli Liste
      </button>
      <button class="context-item text-slate-700 dark:text-slate-200" data-action="numbered">
        <i data-lucide="list-ordered" class="w-4 h-4"></i> Numaralı Liste
      </button>
      <button class="context-item text-slate-700 dark:text-slate-200" data-action="checkbox">
        <i data-lucide="check-square" class="w-4 h-4"></i> Yapılacak Kutusu
      </button>
      <button class="context-item text-slate-700 dark:text-slate-200" data-action="table">
        <i data-lucide="table-2" class="w-4 h-4"></i> Tablo Ekle
      </button>
      <div class="context-separator"></div>
      <div class="px-2 py-1 text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Stil</div>
      <button class="context-item text-slate-700 dark:text-slate-200" data-action="bold">
        <i data-lucide="bold" class="w-4 h-4"></i> Kalın
      </button>
      <button class="context-item text-slate-700 dark:text-slate-200" data-action="italic">
        <i data-lucide="italic" class="w-4 h-4"></i> İtalik
      </button>
      <button class="context-item text-slate-700 dark:text-slate-200" data-action="underline">
        <i data-lucide="underline" class="w-4 h-4"></i> Altı Çizili
      </button>
      <button class="context-item text-slate-700 dark:text-slate-200" data-action="linkProject">
        <i data-lucide="link" class="w-4 h-4"></i> Projeye Bağla...
      </button>
      <button class="context-item text-slate-700 dark:text-slate-200" data-action="codeBlock">
        <i data-lucide="code-2" class="w-4 h-4"></i> Kod Bloğu Ekle
      </button>
      <div class="context-separator"></div>
      <div class="px-2 py-1 text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Yazı Boyutu</div>
      <div class="flex gap-1 px-2 py-1">
        <button class="font-size-btn text-slate-700 dark:text-slate-200" data-action="fontSmall">S</button>
        <button class="font-size-btn text-slate-700 dark:text-slate-200" data-action="fontMedium">M</button>
        <button class="font-size-btn text-slate-700 dark:text-slate-200" data-action="fontLarge">L</button>
        <button class="font-size-btn text-slate-700 dark:text-slate-200" data-action="fontXl">XL</button>
      </div>
      <div class="context-separator"></div>
      <div class="px-2 py-1 text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Kart Rengi</div>
      <div class="flex gap-2 px-2 py-1">
        <button class="color-dot bg-white" data-action="colorWhite" title="Beyaz"></button>
        <button class="color-dot bg-slate-200" data-action="colorSlate" title="Gri"></button>
        <button class="color-dot bg-blue-100" data-action="colorBlue" title="Mavi"></button>
        <button class="color-dot bg-red-100" data-action="colorRed" title="Kırmızı"></button>
        <button class="color-dot bg-green-100" data-action="colorGreen" title="Yeşil"></button>
        <button class="color-dot bg-yellow-100" data-action="colorYellow" title="Sarı"></button>
      </div>
      <div class="context-separator"></div>
      <button class="context-item text-red-600 dark:text-red-400" data-action="deleteBlock">
        <i data-lucide="trash-2" class="w-4 h-4"></i> Bloğu Sil
      </button>
    </div>
  </div>

  <!-- Main Workspace with Sidebar -->
  <div id="main-wrapper">
    <!-- Notebooks Sidebar -->
    <aside id="sidebar" class="bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-700">
      <div class="p-3 border-b border-slate-200 dark:border-slate-700">
        <button id="newPageBtn" class="w-full inline-flex items-center justify-center gap-1.5 px-3 py-1.5 text-sm font-medium rounded-lg bg-indigo-600 text-white hover:bg-indigo-700 active:scale-95 transition">
          <i data-lucide="plus" class="w-4 h-4"></i>
          <span class="new-page-text">Yeni Sayfa</span>
        </button>
      </div>
      <div class="p-2 flex-1 overflow-y-auto">
        <div id="pageList" class="space-y-1">
          <!-- Pages rendered here -->
        </div>
      </div>
      <div class="flex border-t border-slate-200 dark:border-slate-700">
        <button id="toggleSidebar" class="flex-1 p-2 flex items-center justify-center text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200 transition">
          <i data-lucide="panel-left-close" class="w-4 h-4 sidebar-icon-open"></i>
          <i data-lucide="panel-left-open" class="w-4 h-4 sidebar-icon-closed hidden"></i>
        </button>
        <button id="shortcutsBtn" class="p-2 flex items-center justify-center text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200 transition" title="Kısayollar">
          <i data-lucide="keyboard" class="w-4 h-4"></i>
        </button>
      </div>
    </aside>

    <!-- Workspace Canvas -->
    <main id="canvas" class="relative overflow-auto">
      <svg id="connection-svg">
        <defs>
          <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="currentColor" class="text-slate-700 dark:text-slate-300" />
          </marker>
        </defs>
      </svg>
      <svg id="drawing-svg"></svg>
      <div id="emptyState" class="empty-state absolute inset-0 flex flex-col items-center justify-center text-slate-400 dark:text-slate-500">
        <i data-lucide="mouse-pointer-2" class="w-14 h-14 mb-4 opacity-60"></i>
        <p class="text-lg font-medium">Tuvaliniz boş</p>
        <p class="text-sm mt-1">Metin bloğu ekleyin, resim bırakın veya başlamak için çift tıklayın.</p>
      </div>
    </main>
  </div>

  <!-- App Modules (loaded in dependency order) -->
  <script src="js/state.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/shortcuts.js"></script>
  <script src="js/dom-refs.js"></script>
  <script src="js/persistence.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/autocomplete.js"></script>
  <script src="js/page-list.js"></script>
  <script src="js/blocks.js"></script>
  <script src="js/code-cards.js"></script>
  <script src="js/connections.js"></script>
  <script src="js/drawing.js"></script>
  <script src="js/drag-resize.js"></script>
  <script src="js/text-formatting.js"></script>
  <script src="js/image-upload.js"></script>
  <script src="js/canvas-events.js"></script>
  <script src="js/todo.js"></script>
  <script src="js/context-menu.js"></script>
  <script src="js/settings-panel.js"></script>
  <script src="js/init.js"></script>
</body>
</html>
